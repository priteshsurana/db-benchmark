# ============================================================
# postgresql.conf — Benchmark-tuned PostgreSQL 16 configuration
#
# For VM deployment, this file lives at:
#   /etc/postgresql/16/main/postgresql.conf
#
# After editing, restart PostgreSQL:
#   sudo systemctl restart postgresql
#
# Key principle: measure B+Tree insert/read cost, not fsync cost.
# ============================================================

# ============================================================
# CONNECTIONS
# ============================================================
# Must listen on all interfaces so bench-cpp VM can connect.
# Default is 'localhost' which only accepts local connections.
listen_addresses = '*'

max_connections = 20
# Keep low — each connection consumes ~5-10MB.
# 8 threads (EXP-02) + monitoring queries = 12 needed max.

# ============================================================
# MEMORY
# ============================================================
shared_buffers = 1GB
# PostgreSQL's internal buffer pool — B+Tree and heap pages
# cached here. Set to 25% of VM RAM (VM has 4GB).
# Controls warm vs cold cache behavior in EXP-03.

effective_cache_size = 2GB
# Hint to the query planner about total available cache
# (shared_buffers + OS page cache). Set to 50% of VM RAM.
# CRITICAL: if too low, the planner avoids index scans in
# favour of sequential scans, breaking EXP-04 measurements.

work_mem = 16MB
# Memory per sort or hash operation per query.
# Range scans in EXP-05 sort by created_at.
# If too small, sort spills to disk and contaminates latency.

maintenance_work_mem = 256MB
# Used by CREATE INDEX. Higher = faster index builds.
# EXP-04 creates two secondary indexes after 1M row insert.
# With 256MB the B+Tree build happens mostly in memory.

# ============================================================
# WAL (Write-Ahead Log)
# ============================================================
synchronous_commit = off
# THE most important write benchmark setting.
# Default ON: every commit waits for WAL fsync to disk.
# OFF: commit acknowledged immediately, WAL flushed ~200ms later.
# Effect: you measure B+Tree insert cost, not disk fsync cost.
# Trade-off: up to ~200ms of committed data at risk on crash.
# Acceptable for a benchmark — not for production financial data.

wal_buffers = 64MB
# In-memory buffer for WAL records before flushing to WAL files.
# Default 4MB causes frequent small WAL flushes during 1M inserts.
# 64MB allows larger, less frequent sequential WAL writes.

checkpoint_completion_target = 0.9
# Spreads checkpoint I/O over 90% of the checkpoint interval.
# Default 0.5 causes burst I/O when checkpoints fire.
# Without this, a checkpoint mid-experiment spikes your p99.

checkpoint_timeout = 10min
# Checkpoint fires at this interval or when max_wal_size is hit.
# 10 minutes means checkpoints rarely fire during experiments.

max_wal_size = 2GB
# Maximum WAL size before forcing a checkpoint.
# High value keeps checkpoints infrequent during bulk inserts.

# ============================================================
# PLANNER — CRITICAL FOR SSD
# ============================================================
random_page_cost = 1.1
# Cost of a random page read relative to sequential.
# Default is 4.0 — designed for spinning disks where random
# I/O is 4x slower than sequential.
# On SSD random and sequential are nearly equal — set to 1.1.
# CRITICAL: with default 4.0 on SSD, the planner prefers
# sequential scans over index scans for EXP-04, making the
# secondary index experiment measure the wrong execution plan.

seq_page_cost = 1.0
# Baseline cost unit. Leave at default.

effective_io_concurrency = 200
# How many concurrent I/O requests the SSD can handle.
# Affects prefetching for bitmap heap scans and range queries.
# 200 is appropriate for SSDs. Use 1-2 for spinning disks.

# ============================================================
# AUTOVACUUM
# ============================================================
autovacuum = on
# Keep enabled — dead tuples from any updates accumulate and
# bloat the heap without autovacuum. Default settings are fine
# for the Tier-1 experiments (no update-heavy workloads).
